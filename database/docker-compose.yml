services:
  smartstocksuite-db:
    image: postgres:16
    container_name: smartstocksuite_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartstocksuite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - smartstocksuite_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  smartstocksuite_pgdata:      